<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings | NaviRide</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function () {
            const SUPABASE_URL = 'https://ihgyzkjaxdjscugzcpfe.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloZ3l6a2pheGRqc2N1Z3pjcGZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MTkzMDcsImV4cCI6MjA5NjI5NTMwN30.QxFZjQ2s1DGtwrUhA0vCzSN6zuqk35DSIiUyYIQS4dE';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // Removed redirect to allow public access to bookings as requested.
        })();
    </script>
    <style>
        :root { --primary: #f29b11; --dark: #0a0a0a; --card: #111; }
        * { box-sizing: border-box; }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Top bar */
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; margin: 0; }
        h1 span { color: var(--primary); }
        .btn-back { display: inline-flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; opacity: 0.7; transition: 0.3s; font-size: 0.9rem; }
        .btn-back:hover { opacity: 1; color: var(--primary); }
        .top-actions { display: flex; gap: 10px; align-items: center; }

        /* Buttons */
        .btn-admin {
            background: rgba(255,255,255,0.05);
            color: var(--primary);
            border: 1px solid rgba(242,155,17,0.4);
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-admin:hover { background: rgba(242,155,17,0.15); }
        .btn-admin.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .btn-delete {
            background: rgba(231,76,60,0.15);
            color: #e74c3c;
            border: 1px solid rgba(231,76,60,0.3);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
            font-family: inherit;
        }
        .btn-delete:hover { background: rgba(231,76,60,0.3); }

        .btn-delete-all {
            background: rgba(231,76,60,0.15);
            color: #e74c3c;
            border: 1px solid rgba(231,76,60,0.3);
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            font-family: inherit;
            display: none;
        }
        .btn-delete-all:hover { background: rgba(231,76,60,0.3); }

        /* Table */
        .booking-table {
            width: 100%; border-collapse: collapse; background: var(--card);
            border-radius: 15px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        th, td { padding: 16px 18px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(255,255,255,0.02); color: var(--primary); font-family: 'Outfit', sans-serif; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.015); }

        .car-info { display: flex; align-items: center; gap: 12px; }
        .car-info img { width: 55px; height: 36px; object-fit: contain; background: rgba(255,255,255,0.05); border-radius: 5px; padding: 3px; }
        .car-name { font-weight: 600; font-size: 0.9rem; }
        .car-cat { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }

        .status { padding: 4px 12px; border-radius: 50px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
        .status.confirmed { background: rgba(46,204,113,0.2); color: #2ecc71; }

        .price { font-weight: 700; color: var(--primary); }

        /* Hidden columns: contact, price, actions — only shown in admin mode */
        .col-contact, .col-actions, .col-price { display: none; }
        .admin-mode .col-contact,
        .admin-mode .col-actions,
        .admin-mode .col-price { display: table-cell; }

        .empty { text-align: center; padding: 80px; opacity: 0.5; font-size: 1.1rem; }
        .loading-wrap { text-align: center; padding: 80px; }
        .loading-wrap i { color: var(--primary); }
        .hidden { display: none !important; }

        /* Admin Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }
        .admin-login-box {
            background: var(--card); padding: 40px; border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6); width: 100%; max-width: 380px;
            text-align: center; border: 1px solid rgba(255,255,255,0.08);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .admin-login-box h2 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; margin: 0 0 5px; color: var(--primary); }
        .admin-login-box p { opacity: 0.5; margin: 0 0 25px; font-size: 0.85rem; }
        .admin-input { margin-bottom: 18px; text-align: left; }
        .admin-input label { display: block; margin-bottom: 6px; font-size: 0.8rem; opacity: 0.7; font-weight: 600; }
        .admin-input input {
            width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: #fff; font-family: inherit; font-size: 0.9rem;
        }
        .admin-input input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.08); }
        .btn-admin-submit {
            width: 100%; background: var(--primary); color: #000; border: none;
            padding: 13px; border-radius: 8px; font-weight: 700; font-size: 0.95rem;
            cursor: pointer; transition: 0.3s; font-family: inherit;
        }
        .btn-admin-submit:hover { background: #e08b0f; }
        .btn-modal-close {
            position: absolute; top: 15px; right: 18px; background: none; border: none;
            color: #fff; opacity: 0.4; font-size: 1.3rem; cursor: pointer;
        }
        .btn-modal-close:hover { opacity: 1; }
        #admin-error { color: #e74c3c; font-size: 0.82rem; margin-top: 12px; display: none; }

        /* Admin badge */
        .admin-badge {
            display: none; background: rgba(46,204,113,0.15); color: #2ecc71;
            padding: 6px 14px; border-radius: 50px; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .admin-mode .admin-badge { display: inline-flex; align-items: center; gap: 6px; }

        @media (max-width: 900px) {
            body { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
    <div class="container" id="main-content">
        <div class="top-bar">
            <div>
                <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
                <h1><span>NaviRide</span> Bookings</h1>
            </div>
            <div class="top-actions">
                <span class="admin-badge" id="adminBadge"><i class="fas fa-shield-alt"></i> Admin Mode</span>
                <button class="btn-delete-all" id="deleteAllBtn"><i class="fas fa-trash-alt"></i> Delete All</button>
                <button class="btn-admin" id="adminToggleBtn"><i class="fas fa-user-shield"></i> Admin</button>
            </div>
        </div>

        <div class="loading-wrap" id="loading">
            <i class="fas fa-circle-notch fa-spin fa-2x"></i>
            <p style="margin-top:15px; opacity:0.5;">Loading bookings...</p>
        </div>

        <table class="booking-table hidden" id="bookingTable">
            <thead>
                <tr>
                    <th>Car</th>
                    <th>Customer</th>
                    <th class="col-contact">Contact</th>
                    <th>Booking Period</th>
                    <th class="col-price">Amount</th>
                    <th>Status</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="bookingList"></tbody>
        </table>

        <div id="emptyMsg" class="empty hidden">
            <i class="fas fa-calendar-times fa-3x" style="margin-bottom: 20px;"></i>
            <p>No bookings found yet.</p>
        </div>

        <div id="errorMsg" class="empty hidden" style="color: #e74c3c;">
            <i class="fas fa-exclamation-triangle fa-3x" style="margin-bottom: 20px;"></i>
            <p id="errorText">Could not load bookings.</p>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="admin-login-box" style="position:relative;">
            <button class="btn-modal-close" id="closeModal">&times;</button>
            <h2><i class="fas fa-lock"></i> Admin Access</h2>
            <p>Enter admin credentials to unlock full controls.</p>
            <div class="admin-input">
                <label>Admin ID</label>
                <input type="text" id="adminId" placeholder="Enter admin ID">
            </div>
            <div class="admin-input">
                <label>Password</label>
                <input type="password" id="adminPass" placeholder="Enter password">
            </div>
            <button class="btn-admin-submit" id="adminLoginBtn">Unlock Admin Panel</button>
            <div id="admin-error">Invalid credentials. Access denied.</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ihgyzkjaxdjscugzcpfe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloZ3l6a2pheGRqc2N1Z3pjcGZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MTkzMDcsImV4cCI6MjA5NjI5NTMwN30.QxFZjQ2s1DGtwrUhA0vCzSN6zuqk35DSIiUyYIQS4dE';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin = false;

        // ── Elements ──────────────────────────────────────────────────────
        const adminToggleBtn = document.getElementById('adminToggleBtn');
        const adminModal     = document.getElementById('adminModal');
        const closeModal     = document.getElementById('closeModal');
        const adminLoginBtn  = document.getElementById('adminLoginBtn');
        const adminError     = document.getElementById('admin-error');
        const deleteAllBtn   = document.getElementById('deleteAllBtn');
        const mainContent    = document.getElementById('main-content');
        const bookingTable   = document.getElementById('bookingTable');
        const bookingList    = document.getElementById('bookingList');
        const emptyMsg       = document.getElementById('emptyMsg');

        // ── Admin Button → Open Modal ─────────────────────────────────────
        adminToggleBtn.addEventListener('click', () => {
            if (isAdmin) {
                isAdmin = false;
                mainContent.classList.remove('admin-mode');
                adminToggleBtn.classList.remove('active');
                adminToggleBtn.innerHTML = '<i class="fas fa-user-shield"></i> Admin';
                deleteAllBtn.style.display = 'none';
            } else {
                adminModal.classList.add('active');
                document.getElementById('adminId').value = '';
                document.getElementById('adminPass').value = '';
                adminError.style.display = 'none';
                document.getElementById('adminId').focus();
            }
        });

        // ── Close Modal ───────────────────────────────────────────────────
        closeModal.addEventListener('click', () => adminModal.classList.remove('active'));
        adminModal.addEventListener('click', (e) => { if (e.target === adminModal) adminModal.classList.remove('active'); });

        // ── Admin Login ───────────────────────────────────────────────────
        adminLoginBtn.addEventListener('click', () => {
            const id   = document.getElementById('adminId').value.trim();
            const pass = document.getElementById('adminPass').value;

            if (id === 'CaptainSanskar' && pass === 'callmecaptain') {
                isAdmin = true;
                adminModal.classList.remove('active');
                mainContent.classList.add('admin-mode');
                adminToggleBtn.classList.add('active');
                adminToggleBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Exit Admin';
                deleteAllBtn.style.display = 'inline-flex';
            } else {
                adminError.style.display = 'block';
            }
        });

        document.getElementById('adminPass').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') adminLoginBtn.click();
        });

        // ── Delete All ────────────────────────────────────────────────────
        deleteAllBtn.addEventListener('click', async () => {
            if (!isAdmin) return;
            if (!confirm('⚠️ Delete ALL bookings? This cannot be undone.')) return;
            try {
                const { error } = await _supabase.from('bookings').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                if (error) throw error;
                bookingList.innerHTML = '';
                bookingTable.classList.add('hidden');
                emptyMsg.classList.remove('hidden');
                alert('All bookings deleted.');
            } catch (err) {
                alert('Failed: ' + (err.message || 'Unknown error'));
            }
        });

        // ── Delete Single ─────────────────────────────────────────────────
        async function deleteBooking(bookingId, rowEl) {
            if (!isAdmin) return;
            if (!confirm('Delete this booking?')) return;
            try {
                const { error } = await _supabase.from('bookings').delete().eq('id', bookingId);
                if (error) throw error;
                rowEl.remove();
                if (bookingList.children.length === 0) {
                    bookingTable.classList.add('hidden');
                    emptyMsg.classList.remove('hidden');
                }
            } catch (err) {
                alert('Failed: ' + (err.message || 'Unknown error'));
            }
        }

        // ── Render a single booking row ───────────────────────────────────
        function renderRow(b, prepend = false) {
            const date = b.booking_date
                ? new Date(b.booking_date + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
                : '—';
            const duration = b.duration_value && b.duration_unit
                ? `${b.duration_value} ${b.duration_unit}(s)`
                : '';
            const price = b.total_price ? `₹${Number(b.total_price).toLocaleString('en-IN')}` : '—';
            const status = b.booking_status || 'confirmed';

            const row = document.createElement('tr');
            row.dataset.id = b.id;
            row.innerHTML = `
                <td>
                    <div class="car-info">
                        <img src="${b.car_image || ''}" alt="${b.car_name}" onerror="this.style.display='none'">
                        <div>
                            <div class="car-name">${b.car_name}</div>
                            <div class="car-cat">${b.car_category || ''}</div>
                        </div>
                    </div>
                </td>
                <td>${b.full_name}</td>
                <td class="col-contact">${b.contact_number || '—'}</td>
                <td>
                    <div>${date}${b.start_time ? ' at ' + b.start_time : ''}</div>
                    ${duration ? `<div style="font-size:0.75rem;opacity:0.6;">${duration}</div>` : ''}
                </td>
                <td class="price col-price">${price}</td>
                <td><span class="status ${status}">${status}</span></td>
                <td class="col-actions"><button class="btn-delete" data-id="${b.id}"><i class="fas fa-trash"></i> Delete</button></td>
            `;
            row.querySelector('.btn-delete').addEventListener('click', () => deleteBooking(b.id, row));

            if (prepend && bookingList.firstChild) {
                bookingList.insertBefore(row, bookingList.firstChild);
            } else {
                bookingList.appendChild(row);
            }

            // Ensure table is visible
            bookingTable.classList.remove('hidden');
            emptyMsg.classList.add('hidden');
        }

        // ── Load All Bookings ─────────────────────────────────────────────
        async function loadBookings() {
            try {
                const { data: bookings, error } = await _supabase
                    .from('bookings')
                    .select('*')
                    .order('created_at', { ascending: false });

                document.getElementById('loading').classList.add('hidden');
                if (error) throw error;

                if (!bookings || bookings.length === 0) {
                    emptyMsg.classList.remove('hidden');
                    return;
                }

                bookings.forEach(b => renderRow(b));

            } catch (err) {
                console.error('Load error:', err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('errorMsg').classList.remove('hidden');
                if (err.message) document.getElementById('errorText').textContent = err.message;
            }
        }

        // ── Real-time: auto-add new bookings as they come in ─────────────
        _supabase
            .channel('bookings-live')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'bookings'
            }, (payload) => {
                // Check it's not already rendered
                if (!document.querySelector(`tr[data-id="${payload.new.id}"]`)) {
                    renderRow(payload.new, true); // prepend newest first
                }
            })
            .on('postgres_changes', {
                event: 'DELETE',
                schema: 'public',
                table: 'bookings'
            }, (payload) => {
                const row = document.querySelector(`tr[data-id="${payload.old.id}"]`);
                if (row) row.remove();
                if (bookingList.children.length === 0) {
                    bookingTable.classList.add('hidden');
                    emptyMsg.classList.remove('hidden');
                }
            })
            .subscribe();

        // Load on page open
        loadBookings();
    </script>

</body>
</html>
